<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit User Info</title>
</head>
<body>

<a th:href="@{/}">Back to users list</a>

<form th:action="@{/edit}" th:object="${updatedUser}" method="post">
    <input type="hidden" th:field="*{id}">
    <input type="text" th:field="*{name}" th:value="*{name}">
    <input type="text" th:field="*{lastName}" th:value="*{lastName}">
    <input type="number" th:field="*{age}" th:value="*{age}">
    <button type="submit">Update user</button>
</form>
</body>
</html>
